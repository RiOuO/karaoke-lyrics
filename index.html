<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 KaraokeDB</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --border: #2a2a4a;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.3);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --green: #10b981;
    --red: #ef4444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 520px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px 9px 34px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  #searchInput::placeholder { color: var(--muted); }
  #songCount { font-size: 0.8rem; color: var(--accent2); font-weight: 600; margin-left: auto; white-space: nowrap; }

  /* ── App Layout ── */
  .app {
    flex: 1;
    min-height: 0;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 290px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .sidebar-header {
    flex-shrink: 0;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  #songList {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 6px;
  }
  #songList::-webkit-scrollbar { width: 4px; }
  #songList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .song-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 3px;
    transition: background .15s;
  }
  .song-item:hover { background: var(--surface2); }
  .song-item.active {
    background: var(--surface2);
    border-color: var(--accent);
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .song-title { font-size: 0.88rem; font-weight: 600; }
  .song-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .guide-dot { font-size: 0.7rem; }
  .joysound-badge {
    font-size: 0.62rem;
    color: var(--accent2);
    background: rgba(168,85,247,.12);
    border: 1px solid rgba(168,85,247,.3);
    border-radius: 3px;
    padding: 1px 4px;
    font-family: monospace;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .lyrics-panel {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 32px;
  }
  .lyrics-panel::-webkit-scrollbar { width: 4px; }
  .lyrics-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Welcome ── */
  .welcome {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
  }
  .welcome .icon { font-size: 3.5rem; margin-bottom: 14px; opacity: .4; }
  .welcome h2 { font-size: 1.3rem; color: var(--text); opacity: .6; margin-bottom: 6px; }
  .welcome p { font-size: 0.85rem; }

  /* ── Song Header ── */
  .song-header {
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .song-header h1 {
    font-size: 1.7rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e2e8f0, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
  }
  .song-header .artist { color: var(--muted); font-size: .95rem; }
  .song-header .chips { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 9px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* ── Lyrics ── */
/* ── Lyrics ── */
#lyricsContent {
  font-size: 1.1rem;
  line-height: 2.3;
  text-rendering: optimizeLegibility;
}

#lyricsContent .line {
  display: block;
}

ruby {
  ruby-align: center;
  ruby-position: over;
  vertical-align: bottom;
}

rt {
  font-size: 0.55em;
  line-height: 1;
  color: var(--accent2);
}

#lyricsContent,
ruby,
rt {
  font-family:
    "Yu Gothic",
    "Meiryo",
    "Noto Sans JP",
    sans-serif;
}

  /* ── States ── */
  .empty-state { text-align: center; padding: 40px 16px; color: var(--muted); }
  .empty-state .ei { font-size: 2.2rem; margin-bottom: 8px; }
  .loading-state { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 32px; color: var(--muted); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: .85rem;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
    animation: slideIn .2s ease;
    min-width: 200px;
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }
  @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<header>
  <div class="logo">🎤 KaraokeDB</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="搜尋歌名或歌手…" autocomplete="off">
  </div>
  <span id="songCount"></span>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">歌曲列表</div>
    <div id="songList">
      <div class="loading-state"><div class="spinner"></div> 載入中…</div>
    </div>
  </div>
  <div class="main">
    <div class="lyrics-panel" id="lyricsPanel">
      <div class="welcome">
        <div class="icon">🎵</div>
        <h2>選擇一首歌來查看歌詞</h2>
        <p>從左側清單選擇，或使用搜尋功能找歌</p>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const SUPABASE_URL     = 'https://etocohuudhedrepviopc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0b2NvaHV1ZGhlZHJlcHZpb3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTI0MTYsImV4cCI6MjA5MzY2ODQxNn0.rrOYAtzfq4FeLNVL0SIflKqZwwhTD_dNybWTdYEbkdo';

let db, currentSong = null, allSongs = [];

window.addEventListener('DOMContentLoaded', () => {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  loadSongs();
  document.getElementById('searchInput').addEventListener('input', debounce(e => loadSongs(e.target.value.trim()), 300));
});

/* ── Data ── */
async function loadSongs(query = '') {
  document.getElementById('songList').innerHTML =
    '<div class="loading-state"><div class="spinner"></div> 載入中…</div>';

  let req = db.from('songs').select('id,title,artist,joysound_id,guide_vocal').order('title');
  if (query) req = req.or(`title.ilike.%${query}%,artist.ilike.%${query}%`);

  const { data, error } = await req;
  if (error) { showToast('讀取失敗：' + error.message, 'error'); return; }

  allSongs = data || [];
  document.getElementById('songCount').textContent = allSongs.length + ' 首';
  renderList(allSongs);
}

function renderList(songs) {
  const list = document.getElementById('songList');
  if (!songs.length) {
    list.innerHTML = '<div class="empty-state"><div class="ei">🎵</div><p>沒有找到歌曲</p></div>';
    return;
  }
  list.innerHTML = songs.map(s => `
    <div class="song-item${currentSong?.id === s.id ? ' active' : ''}" onclick="pickSong('${s.id}')">
      <div class="song-title">${esc(s.title)}${s.guide_vocal ? ' <span class="guide-dot">🎙️</span>' : ''}</div>
      <div class="song-meta">
        <span>${esc(s.artist || '—')}</span>
        ${s.joysound_id ? `<span class="joysound-badge">${esc(s.joysound_id)}</span>` : ''}
      </div>
    </div>`).join('');
}

async function pickSong(id) {
  const { data, error } = await db.from('songs').select('*').eq('id', id).single();
  if (error) { showToast('讀取失敗', 'error'); return; }
  currentSong = data;
  renderList(allSongs); // refresh active state
  renderLyrics(data);
}

function renderLyrics(song) {
  document.getElementById('lyricsPanel').innerHTML = `
    <div class="song-header">
      <h1>${esc(song.title)}</h1>
      <div class="artist">${esc(song.artist || '—')}</div>
      <div class="chips">
        ${song.joysound_id ? `<span class="chip">🎤 #${esc(song.joysound_id)}</span>` : ''}
        ${song.guide_vocal ? `<span class="chip" style="color:var(--green)">🎙️ ガイドボーカル</span>` : ''}
      </div>
    </div>
    <div id="lyricsContent">${
      song.lyrics
        ? song.lyrics.split('\n').map(l =>
            `<span class="line">${l.trim() ? parseRuby(l) : '&nbsp;'}</span>`).join('')
        : '<span class="no-lyrics">尚未新增歌詞</span>'
    }</div>`;
}

/* ── Ruby parser: 漢字[よみ] → <ruby> ── */
function parseRuby(line) {
  return line.replace(
    /([一-龯々ヶ]+)\[([^\]]+)\]/g,
    '<ruby>$1<rt>$2</rt></ruby>'
  );
}

/* ── Helpers ── */
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

function showToast(msg, type = 'success') {
  const t = Object.assign(document.createElement('div'), { className: `toast ${type}` });
  t.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${esc(msg)}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}
</script>
</body>
</html>

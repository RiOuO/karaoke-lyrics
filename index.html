<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 KaraokeDB</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0d1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --border: #2a2a4a;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --accent-glow: rgba(124,58,237,0.3);
  --text: #e2e8f0;
  --muted: #94a3b8;
  --green: #10b981;
  --red: #ef4444;
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html,
body {
  height: 100%;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* ───────────────────────────── */
/* Header */
/* ───────────────────────────── */
header {
  flex-shrink: 0;
  background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 20;
}
.menu-btn {
  display: none;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 1.4rem;
  cursor: pointer;
}
.logo {
  font-size: 1.4rem;
  font-weight: 700;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
#songCount {
  font-size: .75rem;
  color: var(--accent2);
  font-weight: 600;
  normal-case: none;
  text-transform: none;
}
/* ───────────────────────────── */
/* Layout */
/* ───────────────────────────── */
.app {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  opacity: 0;
  visibility: hidden;
  transition: .25s;
  z-index: 40;
}
/* ───────────────────────────── */
/* Sidebar */
/* ───────────────────────────── */
.sidebar {
  width: 290px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
  z-index: 50;
}
.sidebar-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: .75rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-search {
  flex-shrink: 0;
  position: relative;
  padding: 8px 8px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search-icon {
  position: absolute;
  left: 19px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  font-size: .85rem;
}
#searchInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px 8px 32px;
  color: var(--text);
  font-size: .88rem;
  outline: none;
  transition: .2s;
}
#searchInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
#searchInput::placeholder {
  color: var(--muted);
}
#songList {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
#songList::-webkit-scrollbar {
  width: 4px;
}
#songList::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}
.song-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  margin-bottom: 3px;
  transition: .15s;
}
.song-item:hover {
  background: var(--surface2);
}
.song-item.active {
  background: var(--surface2);
  border-color: var(--accent);
  box-shadow: inset 3px 0 0 var(--accent);
}
.song-title {
  font-size: 1rem;
  font-weight: 600;
}
.song-meta {
  font-size: .82rem;
  color: var(--muted);
  margin-top: 3px;
  display: flex;
  gap: 6px;
  align-items: center;
}
.guide-dot {
  font-size: .7rem;
}
.joysound-badge {
  font-size: .62rem;
  color: var(--accent2);
  background: rgba(168,85,247,.12);
  border: 1px solid rgba(168,85,247,.3);
  border-radius: 3px;
  padding: 1px 4px;
  font-family: monospace;
}
/* ───────────────────────────── */
/* Main */
/* ───────────────────────────── */
.main {
  flex: 1;
  min-width: 0;
  overflow: hidden;
}
.lyrics-panel {
  height: 100%;
  overflow-y: auto;
  padding: 32px;
}
.lyrics-panel::-webkit-scrollbar {
  width: 4px;
}
.lyrics-panel::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}
/* ───────────────────────────── */
/* Welcome */
/* ───────────────────────────── */
.welcome {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  text-align: center;
}
.welcome .icon {
  font-size: 3.5rem;
  margin-bottom: 14px;
  opacity: .4;
}
.welcome h2 {
  font-size: 1.3rem;
  color: var(--text);
  opacity: .6;
  margin-bottom: 6px;
}
/* ───────────────────────────── */
/* Song Header */
/* ───────────────────────────── */
.song-header {
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.song-header h1 {
  font-size: 1.7rem;
  font-weight: 700;
  background: linear-gradient(135deg, #e2e8f0, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 5px;
}
.song-header .artist {
  color: var(--muted);
  font-size: .95rem;
}
.song-header .chips {
  display: flex;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 9px;
  font-size: .72rem;
  color: var(--muted);
}
/* ───────────────────────────── */
/* Lyrics */
/* ───────────────────────────── */
#lyricsContent {
  font-size: 1.1rem;
  line-height: 2.3;
  text-rendering: optimizeLegibility;
  word-break: break-word;
}
#lyricsContent .line {
  display: block;
  padding-top: 1em;  /* 固定預留注音空間，有無 ruby 的行高都一致 */
}
ruby {
  ruby-align: center;
  ruby-position: over;
  vertical-align: bottom;
}
rt {
  font-size: .55em;
  line-height: 1;
  color: var(--accent2);
}
#lyricsContent,
ruby,
rt {
  font-family:
    "Yu Gothic",
    "Meiryo",
    "Noto Sans JP",
    sans-serif;
}
/* ───────────────────────────── */
/* States */
/* ───────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: var(--muted);
}
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 32px;
  color: var(--muted);
}
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
/* ───────────────────────────── */
/* Toast */
/* ───────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  font-size: .85rem;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 6px 20px rgba(0,0,0,.35);
  animation: slideIn .2s ease;
}
.toast.success {
  border-left: 3px solid var(--green);
}
.toast.error {
  border-left: 3px solid var(--red);
}
@keyframes slideIn {
  from {
    transform: translateX(110%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}
/* ───────────────────────────── */
/* Tablet */
/* ───────────────────────────── */
@media (max-width: 1024px) {
  .sidebar {
    width: 240px;
  }
  .lyrics-panel {
    padding: 24px;
  }
  #lyricsContent {
    font-size: 1rem;
  }
}
/* ───────────────────────────── */
/* Mobile */
/* ───────────────────────────── */
@media (max-width: 768px) {
  body {
    overflow: hidden;
  }
  header {
    padding: 12px;
    gap: 10px;
  }
  .menu-btn {
    display: block;
  }
  .logo {
    font-size: 1.1rem;
  }
  #songCount {
    display: none;
  }
  .search-wrap {
    max-width: unset;
  }
  .sidebar {
    position: fixed;
    top: 0;
    bottom: 0;
    left: -280px;
    width: 280px;
    transition: left .25s ease;
    box-shadow: 0 0 30px rgba(0,0,0,.4);
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .lyrics-panel {
    padding: 18px 16px 80px;
  }
  .song-header h1 {
    font-size: 1.3rem;
    line-height: 1.3;
  }
  .song-header .artist {
    font-size: .85rem;
  }
  #lyricsContent {
    font-size: 1rem;
    line-height: 2.15;
  }
  rt {
    font-size: .5em;
  }
  .toast-container {
    left: 12px;
    right: 12px;
    bottom: 12px;
  }
  .toast {
    width: 100%;
  }
}
/* ───────────────────────────── */
/* Small Phones */
/* ───────────────────────────── */
@media (max-width: 420px) {
  #lyricsContent {
    font-size: .95rem;
    line-height: 2.05;
  }
  rt {
    font-size: .48em;
  }
  .song-title {
    font-size: .82rem;
  }
  .song-meta {
    font-size: .68rem;
  }
}
</style>
</head>
<body>
<header>
  <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
  <div class="logo">&#127908; KaraokeDB</div>

</header>
<div class="app">
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-header"><span>歌曲列表</span><span id="songCount"></span></div>
    <div class="sidebar-search"><span class="sidebar-search-icon">🔍</span><input id="searchInput" type="text" placeholder="搜尋歌名或歌手…" autocomplete="off"></div>
    <div id="songList">
      <div class="loading-state">
        <div class="spinner"></div>
        &#36617;&#20837;&#20013;&#8230;
      </div>
    </div>
  </div>
  <div class="main">
    <div class="lyrics-panel" id="lyricsPanel">
      <div class="welcome">
        <div class="icon">&#127925;</div>
        <h2>&#36984;&#25320;&#19968;&#39318;&#27468;&#20358;&#26597;&#30475;&#27468;&#35789;</h2>
        <p>&#24478;&#24038;&#20391;&#28165;&#21934;&#36984;&#25320;&#65292;&#25110;&#20351;&#29992;&#25628;&#23544;&#21151;&#33021;&#25214;&#27468;</p>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
/* FIX: Remove /rest/v1/ — the Supabase JS client adds it internally */
const SUPABASE_URL = 'https://etocohuudhedrepviopc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0b2NvaHV1ZGhlZHJlcHZpb3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTI0MTYsImV4cCI6MjA5MzY2ODQxNn0.rrOYAtzfq4FeLNVL0SIflKqZwwhTD_dNybWTdYEbkdo';
let db;
let currentSong = null;
let allSongs = [];
window.addEventListener('DOMContentLoaded', () => {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  loadSongs();
  document
    .getElementById('searchInput')
    .addEventListener('input', debounce(e => loadSongs(e.target.value.trim()), 300));
});
async function loadSongs(query = '') {
  document.getElementById('songList').innerHTML =
    '<div class="loading-state"><div class="spinner"></div> 載入中…</div>';
  let req = db.from('songs').select('id,title,artist,joysound_id,guide_vocal').order('title');
  if (query) req = req.or(`title.ilike.%${query}%,artist.ilike.%${query}%`);
  const { data, error } = await req;
  if (error) { showToast('讀取失敗：' + error.message, 'error'); return; }
  allSongs = data || [];
  document.getElementById('songCount').textContent = allSongs.length + ' 首';
  renderList(allSongs);
}
function renderList(songs) {
  const list = document.getElementById('songList');
  if (!songs.length) {
    list.innerHTML = '<div class="empty-state">沒有找到歌曲</div>';
    return;
  }
  list.innerHTML = songs.map(s => `
    <div class="song-item${currentSong?.id === s.id ? ' active' : ''}" onclick="pickSong('${s.id}')">
      <div class="song-title">${esc(s.title)}${s.guide_vocal ? ' <span class="guide-dot">🎤</span>' : ''}</div>
      <div class="song-meta">
        <span>${esc(s.artist || '—')}</span>
        ${s.joysound_id ? `<span class="joysound-badge">${esc(s.joysound_id)}</span>` : ''}
      </div>
    </div>`).join('');
}
async function pickSong(id) {
  const { data, error } = await db.from('songs').select('*').eq('id', id).single();
  if (error) { showToast('讀取失敗', 'error'); return; }
  currentSong = data;
  renderList(allSongs);
  renderLyrics(data);
  if (window.innerWidth <= 768) closeSidebar();
}
function renderLyrics(song) {
  document.getElementById('lyricsPanel').innerHTML = `
    <div class="song-header">
      <h1>${esc(song.title)}</h1>
      <div class="artist">${esc(song.artist || '—')}</div>
      <div class="chips">
        ${song.joysound_id ? `<span class="chip">🎤 #${esc(song.joysound_id)}</span>` : ''}
        ${song.guide_vocal ? `<span class="chip" style="color:var(--green)">🎤 ガイドボーカル</span>` : ''}
      </div>
    </div>
    <div id="lyricsContent">${
      song.lyrics
        ? song.lyrics.split('\n').map(l =>
            `<span class="line">${l.trim() ? parseRuby(l) : '&nbsp;'}</span>`).join('')
        : '<span class="no-lyrics">尚未新增歌詞</span>'
    }</div>`;
}
/* Ruby parser — 漢字[よみ] → <ruby> */
function parseRuby(line) {
  return esc(line).replace(
    /([一-龯々ヶ]+)\[([^\]]+)\]/g,
    '<ruby>$1<rt>$2</rt></ruby>'
  );
}
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
function showToast(msg, type = 'success') {
  const t = Object.assign(document.createElement('div'), { className: `toast ${type}` });
  t.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${esc(msg)}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('show');
}
</script>
</body>
</html>
